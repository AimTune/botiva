[project]
name = "botiva-auth"
version = "0.1.0"
description = "botiva authentication adapters — static-token, HMAC-JWT and cookie authenticators for the botiva auth port (stdlib only)."
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["botiva", "chativa", "auth", "jwt", "cookie"]
dependencies = ["botiva"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["botiva_auth*"]
